<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #e0e0e0;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 16px;
      color: #4ecca3;
      letter-spacing: 4px;
    }

    .info-bar {
      display: flex;
      gap: 40px;
      margin-bottom: 16px;
      font-size: 1rem;
    }

    .info-bar span {
      color: #a0a0c0;
    }

    .info-bar strong {
      color: #4ecca3;
    }

    #gameCanvas {
      border: 2px solid #4ecca3;
      box-shadow: 0 0 20px rgba(78, 204, 163, 0.3);
      display: block;
    }

    .controls {
      margin-top: 20px;
      text-align: center;
      color: #606080;
      font-size: 0.85rem;
      line-height: 1.8;
    }

    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    #overlay h2 {
      font-size: 1.8rem;
      color: #ff6b6b;
    }

    #overlay p {
      color: #a0a0c0;
    }

    #startBtn {
      background: transparent;
      border: 2px solid #4ecca3;
      color: #4ecca3;
      padding: 10px 32px;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.2s;
    }

    #startBtn:hover {
      background: #4ecca3;
      color: #1a1a2e;
    }

    .canvas-wrapper {
      position: relative;
    }
  </style>
</head>
<body>
  <h1>贪吃蛇</h1>
  <div class="info-bar">
    <div><span>得分：</span><strong id="score">0</strong></div>
    <div><span>最高分：</span><strong id="highScore">0</strong></div>
    <div><span>等级：</span><strong id="level">1</strong></div>
  </div>
  <div class="canvas-wrapper">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="overlay">
      <h2 id="overlayTitle">贪吃蛇</h2>
      <p id="overlayMsg">用方向键或 WASD 控制移动</p>
      <button id="startBtn">开始游戏</button>
    </div>
  </div>
  <div class="controls">
    方向键 / WASD 控制 &nbsp;|&nbsp; P 暂停 &nbsp;|&nbsp; 吃食物加速
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlayMsg = document.getElementById('overlayMsg');
    const startBtn = document.getElementById('startBtn');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('highScore');
    const levelEl = document.getElementById('level');

    const GRID = 20;
    const COLS = canvas.width / GRID;
    const ROWS = canvas.height / GRID;

    let snake, dir, nextDir, food, score, highScore, level, speed, gameLoop, paused, running;

    highScore = 0;

    function initGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 },
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      level = 1;
      speed = 150;
      paused = false;
      running = true;
      scoreEl.textContent = 0;
      levelEl.textContent = 1;
      spawnFood();
    }

    function spawnFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS),
        };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function update() {
      if (paused || !running) return;

      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // 碰墙
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        return gameOver();
      }
      // 碰自身
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        return gameOver();
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += level * 10;
        scoreEl.textContent = score;
        if (score > highScore) {
          highScore = score;
          highScoreEl.textContent = highScore;
        }
        // 每 50 分升一级，最快 60ms
        level = Math.floor(score / 50) + 1;
        speed = Math.max(60, 150 - (level - 1) * 10);
        levelEl.textContent = level;
        spawnFood();
        // 重启计时器适应新速度
        clearInterval(gameLoop);
        gameLoop = setInterval(tick, speed);
      } else {
        snake.pop();
      }

      draw();
    }

    function tick() {
      update();
    }

    function draw() {
      // 背景
      ctx.fillStyle = '#0f0f1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 网格（淡）
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= COLS; i++) {
        ctx.beginPath();
        ctx.moveTo(i * GRID, 0);
        ctx.lineTo(i * GRID, canvas.height);
        ctx.stroke();
      }
      for (let j = 0; j <= ROWS; j++) {
        ctx.beginPath();
        ctx.moveTo(0, j * GRID);
        ctx.lineTo(canvas.width, j * GRID);
        ctx.stroke();
      }

      // 食物
      const fx = food.x * GRID + GRID / 2;
      const fy = food.y * GRID + GRID / 2;
      ctx.fillStyle = '#ff6b6b';
      ctx.shadowColor = '#ff6b6b';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(fx, fy, GRID / 2 - 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // 蛇身
      snake.forEach((seg, i) => {
        const ratio = 1 - i / snake.length;
        const r = Math.round(78 * ratio + 20 * (1 - ratio));
        const g = Math.round(204 * ratio + 100 * (1 - ratio));
        const b = Math.round(163 * ratio + 80 * (1 - ratio));
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        if (i === 0) {
          ctx.shadowColor = '#4ecca3';
          ctx.shadowBlur = 10;
        } else {
          ctx.shadowBlur = 0;
        }
        const padding = i === 0 ? 1 : 2;
        ctx.beginPath();
        ctx.roundRect(
          seg.x * GRID + padding,
          seg.y * GRID + padding,
          GRID - padding * 2,
          GRID - padding * 2,
          i === 0 ? 4 : 3
        );
        ctx.fill();
      });
      ctx.shadowBlur = 0;

      // 眼睛
      drawEyes();
    }

    function drawEyes() {
      const head = snake[0];
      const cx = head.x * GRID + GRID / 2;
      const cy = head.y * GRID + GRID / 2;
      const eyeOffset = 4;
      const eyeRadius = 2;

      let ex1, ey1, ex2, ey2;
      if (dir.x === 1)  { ex1 = cx + 3; ey1 = cy - eyeOffset; ex2 = cx + 3; ey2 = cy + eyeOffset; }
      else if (dir.x === -1) { ex1 = cx - 3; ey1 = cy - eyeOffset; ex2 = cx - 3; ey2 = cy + eyeOffset; }
      else if (dir.y === -1) { ex1 = cx - eyeOffset; ey1 = cy - 3; ex2 = cx + eyeOffset; ey2 = cy - 3; }
      else               { ex1 = cx - eyeOffset; ey1 = cy + 3; ex2 = cx + eyeOffset; ey2 = cy + 3; }

      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath(); ctx.arc(ex1, ey1, eyeRadius, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2, ey2, eyeRadius, 0, Math.PI * 2); ctx.fill();
    }

    function gameOver() {
      running = false;
      clearInterval(gameLoop);
      overlayTitle.textContent = '游戏结束';
      overlayTitle.style.color = '#ff6b6b';
      overlayMsg.textContent = `得分：${score}`;
      startBtn.textContent = '再来一局';
      overlay.style.display = 'flex';
    }

    function startGame() {
      overlay.style.display = 'none';
      clearInterval(gameLoop);
      initGame();
      draw();
      gameLoop = setInterval(tick, speed);
    }

    startBtn.addEventListener('click', startGame);

    document.addEventListener('keydown', e => {
      switch (e.key) {
        case 'ArrowUp':    case 'w': case 'W': if (dir.y !== 1)  nextDir = { x: 0, y: -1 }; e.preventDefault(); break;
        case 'ArrowDown':  case 's': case 'S': if (dir.y !== -1) nextDir = { x: 0, y: 1 };  e.preventDefault(); break;
        case 'ArrowLeft':  case 'a': case 'A': if (dir.x !== 1)  nextDir = { x: -1, y: 0 }; e.preventDefault(); break;
        case 'ArrowRight': case 'd': case 'D': if (dir.x !== -1) nextDir = { x: 1, y: 0 };  e.preventDefault(); break;
        case 'p': case 'P':
          if (!running) return;
          paused = !paused;
          if (paused) {
            overlayTitle.textContent = '已暂停';
            overlayTitle.style.color = '#4ecca3';
            overlayMsg.textContent = '按 P 继续';
            startBtn.style.display = 'none';
            overlay.style.display = 'flex';
          } else {
            overlay.style.display = 'none';
            startBtn.style.display = '';
          }
          break;
      }
    });

    // 初始绘制
    ctx.fillStyle = '#0f0f1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  </script>
</body>
</html>
